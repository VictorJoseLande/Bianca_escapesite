<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Story of Bianca</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Lora:ital,wght@0,400;0,700;1,400&family=Inter:wght@400;600&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --gold: #d4a843;
    --gold-light: #f0d68a;
    --purple: #4a1942;
    --purple-light: #8b3a7f;
    --dark: #1a0a1a;
    --cream: #fdf6e3;
    --red: #c0392b;
    --green: #27ae60;
    --blue: #2980b9;
  }

  body {
    font-family: 'Lora', serif;
    background: var(--dark);
    color: var(--cream);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ===== STARFIELD BACKGROUND ===== */
  .stars {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    pointer-events: none; z-index: 0;
  }
  .star {
    position: absolute;
    background: white;
    border-radius: 50%;
    animation: twinkle var(--dur) ease-in-out infinite;
  }
  @keyframes twinkle {
    0%, 100% { opacity: 0.2; }
    50% { opacity: 1; }
  }

  /* ===== MAIN CONTAINER ===== */
  .container {
    position: relative; z-index: 1;
    max-width: 700px; margin: 0 auto; padding: 20px;
    min-height: 100vh;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
  }

  /* ===== TITLE SCREEN ===== */
  .title-screen {
    text-align: center;
    animation: fadeInUp 1.5s ease;
  }
  .title-screen h1 {
    font-family: 'Cinzel Decorative', cursive;
    font-size: clamp(2rem, 6vw, 3.5rem);
    color: var(--gold);
    text-shadow: 0 0 30px rgba(212, 168, 67, 0.5);
    margin-bottom: 10px;
    animation: shimmer 3s ease-in-out infinite;
  }
  .title-screen .crown {
    font-size: 4rem;
    animation: float 2s ease-in-out infinite;
    display: block;
    margin-bottom: 15px;
  }
  .title-screen .subtitle {
    font-style: italic;
    color: var(--gold-light);
    font-size: 1.1rem;
    margin-bottom: 30px;
    opacity: 0.8;
  }
  .title-screen .tagline {
    color: #aaa;
    font-size: 0.9rem;
    margin-bottom: 40px;
    line-height: 1.6;
  }

  @keyframes shimmer {
    0%, 100% { text-shadow: 0 0 30px rgba(212,168,67,0.5); }
    50% { text-shadow: 0 0 60px rgba(212,168,67,0.8), 0 0 100px rgba(212,168,67,0.3); }
  }
  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-10px); }
  }
  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* ===== LEVEL SCREEN ===== */
  .level-screen {
    text-align: center;
    animation: fadeInUp 0.8s ease;
    width: 100%;
  }
  .level-header {
    font-family: 'Cinzel Decorative', cursive;
    color: var(--gold);
    font-size: 0.9rem;
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 5px;
  }
  .level-title {
    font-family: 'Cinzel Decorative', cursive;
    font-size: clamp(1.4rem, 4vw, 2rem);
    color: var(--gold-light);
    margin-bottom: 20px;
  }
  .level-emoji {
    font-size: 3rem;
    margin-bottom: 15px;
    display: block;
    animation: float 2.5s ease-in-out infinite;
  }
  .story-text {
    font-family: 'Lora', serif;
    font-style: italic;
    color: #ccc;
    line-height: 1.8;
    margin-bottom: 25px;
    font-size: 1rem;
    max-width: 550px;
    margin-left: auto;
    margin-right: auto;
  }
  .narrator {
    color: var(--gold);
    font-weight: 700;
    font-style: normal;
  }
  .ouf {
    color: #ff6b6b;
    font-weight: 700;
    font-size: 1.3em;
    font-style: normal;
    animation: oufPulse 0.5s ease;
  }
  @keyframes oufPulse {
    0% { transform: scale(1); }
    50% { transform: scale(1.3); }
    100% { transform: scale(1); }
  }

  /* ===== PUZZLE AREA ===== */
  .puzzle-area {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(212,168,67,0.3);
    border-radius: 15px;
    padding: 25px;
    margin: 20px 0;
    width: 100%;
  }
  .puzzle-instruction {
    font-family: 'Inter', sans-serif;
    color: var(--gold-light);
    font-size: 0.95rem;
    margin-bottom: 15px;
  }

  /* Text input */
  .answer-input {
    font-family: 'Inter', sans-serif;
    font-size: 1.1rem;
    padding: 12px 20px;
    border: 2px solid var(--gold);
    border-radius: 10px;
    background: rgba(0,0,0,0.3);
    color: var(--cream);
    text-align: center;
    width: 100%;
    max-width: 350px;
    outline: none;
    transition: all 0.3s;
  }
  .answer-input:focus {
    border-color: var(--gold-light);
    box-shadow: 0 0 20px rgba(212,168,67,0.3);
  }
  .answer-input::placeholder { color: #666; }

  /* Option buttons */
  .options-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin: 15px 0;
  }
  .option-btn {
    font-family: 'Inter', sans-serif;
    padding: 14px 16px;
    border: 2px solid rgba(212,168,67,0.4);
    border-radius: 10px;
    background: rgba(0,0,0,0.3);
    color: var(--cream);
    font-size: 0.9rem;
    cursor: pointer;
    transition: all 0.3s;
    text-align: center;
  }
  .option-btn:hover {
    border-color: var(--gold);
    background: rgba(212,168,67,0.15);
    transform: translateY(-2px);
  }
  .option-btn.selected {
    border-color: var(--gold);
    background: rgba(212,168,67,0.2);
  }
  .option-btn.correct {
    border-color: var(--green) !important;
    background: rgba(39,174,96,0.2) !important;
    animation: correctPulse 0.5s ease;
  }
  .option-btn.wrong {
    border-color: var(--red) !important;
    background: rgba(192,57,43,0.2) !important;
    animation: shake 0.5s ease;
  }
  @keyframes correctPulse {
    0% { transform: scale(1); }
    50% { transform: scale(1.05); }
    100% { transform: scale(1); }
  }
  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-10px); }
    75% { transform: translateX(10px); }
  }

  /* Sequence / drag puzzle */
  .sequence-area {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
    margin: 15px 0;
  }
  .seq-letter {
    font-family: 'Inter', sans-serif;
    width: 45px; height: 45px;
    display: flex; align-items: center; justify-content: center;
    border: 2px solid var(--gold);
    border-radius: 8px;
    background: rgba(0,0,0,0.4);
    color: var(--cream);
    font-size: 1.2rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    user-select: none;
  }
  .seq-letter:hover { background: rgba(212,168,67,0.2); transform: scale(1.1); }
  .seq-letter.used { opacity: 0.3; pointer-events: none; }

  .answer-display {
    font-family: 'Inter', sans-serif;
    font-size: 1.5rem;
    letter-spacing: 8px;
    color: var(--gold);
    margin: 15px 0;
    min-height: 40px;
    border-bottom: 2px solid rgba(212,168,67,0.3);
    padding-bottom: 5px;
  }

  /* ===== BUTTONS ===== */
  .btn {
    font-family: 'Cinzel Decorative', cursive;
    padding: 14px 40px;
    border: 2px solid var(--gold);
    border-radius: 50px;
    background: transparent;
    color: var(--gold);
    font-size: 1rem;
    cursor: pointer;
    transition: all 0.3s;
    margin-top: 15px;
    letter-spacing: 1px;
  }
  .btn:hover {
    background: var(--gold);
    color: var(--dark);
    box-shadow: 0 0 30px rgba(212,168,67,0.4);
    transform: translateY(-2px);
  }
  .btn:disabled {
    opacity: 0.3;
    cursor: not-allowed;
    transform: none;
  }
  .btn-small {
    font-family: 'Inter', sans-serif;
    padding: 8px 20px;
    font-size: 0.85rem;
    letter-spacing: 0;
  }
  .clear-btn {
    border-color: #666;
    color: #999;
    font-family: 'Inter', sans-serif;
    padding: 8px 20px;
    font-size: 0.8rem;
    margin-top: 10px;
  }
  .clear-btn:hover { background: #333; color: #fff; border-color: #999; }

  /* ===== FEEDBACK ===== */
  .feedback {
    margin-top: 15px;
    padding: 12px 20px;
    border-radius: 10px;
    font-family: 'Inter', sans-serif;
    font-size: 0.9rem;
    animation: fadeInUp 0.3s ease;
  }
  .feedback.wrong {
    background: rgba(192,57,43,0.2);
    border: 1px solid rgba(192,57,43,0.5);
    color: #ff6b6b;
  }
  .feedback.correct {
    background: rgba(39,174,96,0.2);
    border: 1px solid rgba(39,174,96,0.5);
    color: #6bff8a;
  }
  .feedback.hint {
    background: rgba(41,128,185,0.2);
    border: 1px solid rgba(41,128,185,0.5);
    color: #6bb5ff;
  }

  /* ===== PROGRESS BAR ===== */
  .progress-bar {
    position: fixed;
    top: 0; left: 0;
    height: 4px;
    background: linear-gradient(90deg, var(--gold), var(--gold-light));
    transition: width 0.5s ease;
    z-index: 100;
    box-shadow: 0 0 10px rgba(212,168,67,0.5);
  }

  /* ===== CONFETTI ===== */
  .confetti-piece {
    position: fixed;
    width: 10px;
    height: 10px;
    z-index: 200;
    animation: confettiFall var(--fall-dur) linear forwards;
  }
  @keyframes confettiFall {
    0% { transform: translateY(-10vh) rotate(0deg); opacity: 1; }
    100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
  }

  /* ===== PRINCESS RUNNING ===== */
  .princess-run {
    position: fixed;
    bottom: 20px;
    font-size: 2rem;
    animation: runAcross 4s linear;
    z-index: 50;
    pointer-events: none;
  }
  @keyframes runAcross {
    0% { left: -50px; }
    100% { left: calc(100vw + 50px); }
  }

  /* ===== FINAL SCREEN ===== */
  .final-screen {
    text-align: center;
    animation: fadeInUp 1s ease;
  }
  .final-screen h1 {
    font-family: 'Cinzel Decorative', cursive;
    font-size: clamp(2rem, 6vw, 3rem);
    color: var(--gold);
    margin-bottom: 20px;
  }
  .birthday-text {
    font-size: 1.3rem;
    color: var(--cream);
    line-height: 1.8;
    margin: 20px 0;
  }
  .final-emoji {
    font-size: 5rem;
    animation: float 2s ease-in-out infinite;
    margin: 20px 0;
  }

  /* ===== MATCHING PUZZLE ===== */
  .match-container {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    gap: 8px;
    align-items: start;
    margin: 15px 0;
  }
  .match-left, .match-right {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .match-item {
    padding: 10px 14px;
    border: 2px solid rgba(212,168,67,0.4);
    border-radius: 8px;
    background: rgba(0,0,0,0.3);
    color: var(--cream);
    font-family: 'Inter', sans-serif;
    font-size: 0.85rem;
    cursor: pointer;
    transition: all 0.3s;
    text-align: center;
  }
  .match-item:hover { border-color: var(--gold); }
  .match-item.active { border-color: var(--gold); background: rgba(212,168,67,0.2); }
  .match-item.matched { border-color: var(--green); background: rgba(39,174,96,0.15); opacity: 0.7; pointer-events: none; }
  .match-divider {
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.5rem;
    color: var(--gold);
    padding-top: 10px;
  }

  /* ===== SLIDER PUZZLE ===== */
  .slider-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin: 12px 0;
    font-family: 'Inter', sans-serif;
  }
  .slider-label { color: #aaa; font-size: 0.85rem; min-width: 120px; text-align: right; }
  .slider-row input[type="range"] { flex: 1; accent-color: var(--gold); }
  .slider-value { color: var(--gold); font-weight: 600; min-width: 30px; }

  /* ===== RESPONSIVE ===== */
  @media (max-width: 500px) {
    .options-grid { grid-template-columns: 1fr; }
    .match-container { grid-template-columns: 1fr; }
    .match-divider { display: none; }
    .seq-letter { width: 38px; height: 38px; font-size: 1rem; }
  }
</style>
</head>
<body>

<div class="stars" id="stars"></div>
<div class="progress-bar" id="progressBar"></div>

<div class="container" id="app"></div>

<script>
// ===== GAME STATE =====
const state = { level: 0, attempts: {} };

// ===== LEVEL DATA =====
const levels = [
  // TITLE SCREEN (level 0)
  null,

  // LEVEL 1: The Last Espresso
  {
    title: "The Last Espresso",
    emoji: "☕",
    story: `<span class="narrator">Once upon a time,</span> in the magnificent Kingdom of Croatia, there lived a princess named Bianca. She was beloved by all — mostly because she was the loudest person in every room and impossible to ignore.<br><br>One fateful morning, Princess Bianca reached for her espresso... <br><br>The cup was empty. The pot was empty. The entire kingdom was <em>out of espresso</em>.<br><br><span class="ouf">OUF!</span><br><br>This was, obviously, a national emergency.`,
    puzzle: "unscramble",
    instruction: "Unscramble the letters to reveal what Bianca needs most:",
    scrambled: "SSOEERPS",
    answer: "ESPRESSO",
    hint: "It's what every Croatian princess needs to function ☕",
    successMsg: "YES! Without espresso, civilization itself crumbles! 🏃‍♀️💨"
  },

  // LEVEL 2: The Royal Wardrobe Crisis
  {
    title: "The Royal Wardrobe Crisis",
    emoji: "👗",
    story: `<span class="narrator">Chapter II.</span> Princess Bianca could not simply <em>flee</em> the kingdom looking like a peasant. She was, after all, periodically a diva — and this was definitely one of those periods.<br><br>She threw open her royal wardrobe. Hundreds of outfits. But only ONE was suitable for a dramatic escape across Europe.<br><br><span class="ouf">OUF!</span> The pressure!`,
    puzzle: "choice",
    instruction: "Choose the correct escape outfit for a Croatian princess on the run:",
    options: [
      { text: "👟 Sneakers, joggers & a hoodie", correct: false, response: "Comfortable? Yes. Dramatic enough? ABSOLUTELY NOT." },
      { text: "👑 Full ball gown with tiara & heels", correct: false, response: "Bianca considered it for 45 minutes, but you can't run in heels. Well, SHE can, but still." },
      { text: "🕶️ Sunglasses, leather jacket & espresso-stained vintage dress", correct: true, response: "PERFECT. Stylish, fashionable, and the espresso stain adds character. A true diva escape look." },
      { text: "🧥 Full Viking armor (preparing early)", correct: false, response: "Bold strategy, but she hasn't even arrived in Norway yet. Patience, warrior." }
    ],
    successMsg: "The outfit was *chef's kiss*. Now RUN, princess! 🏃‍♀️✨"
  },

  // LEVEL 3: Sneaking Past the Guards
  {
    title: "Sneaking Past the Guards",
    emoji: "🏰",
    story: `<span class="narrator">Chapter III.</span> The castle gates were guarded by the Royal Croatian Guard — three extremely serious men who had not smiled since 1997.<br><br>But Bianca knew their weakness. These guards were, deep down, party animals. They just needed... an invitation.<br><br>"If I throw a party," Bianca whispered to herself, "they'll abandon their posts in exactly 4.5 seconds."<br><br>She was right. It took 3.`,
    puzzle: "choice",
    instruction: "What kind of party did Bianca throw to distract the guards?",
    options: [
      { text: "🎭 A murder mystery — her specialty", correct: true, response: "OF COURSE! She literally invented this. The guards were assigned characters and completely forgot about guarding." },
      { text: "🎤 A karaoke night", correct: false, response: "Close, but Bianca's voice would alert the ENTIRE kingdom, not just distract the guards." },
      { text: "🍕 A pizza party", correct: false, response: "Too basic for Princess Bianca. She has STANDARDS." },
      { text: "🧘 A meditation retreat", correct: false, response: "Have you MET Bianca? Silent meditation? The woman is the loudest person in EVERY room." }
    ],
    successMsg: "The guards are now deeply invested in finding out who murdered Count Čevapčići. Bianca RUNS! 🏃‍♀️💨"
  },

  // LEVEL 4: The Adriatic Crossing
  {
    title: "The Adriatic Sea Crossing",
    emoji: "⛵",
    story: `<span class="narrator">Chapter IV.</span> Princess Bianca stole the royal yacht. Well, "borrowed." Well, "commandeered with dramatic flair."<br><br>But the yacht's navigation system was locked behind a Croatian trivia quiz. Because of COURSE it was — Croatian boats are very patriotic.<br><br>The Adriatic sparkled beneath a perfect summer sky. Bianca lit a cigarette, sipped her last emergency espresso, and felt, for a moment, very at peace.<br><br>Then the boat demanded answers.`,
    puzzle: "choice",
    instruction: "Croatian Trivia: What is the capital of Croatia?",
    options: [
      { text: "Split", correct: false, response: "Split is gorgeous, but it's not the capital! Try again, princeza." },
      { text: "Zagreb", correct: true, response: "DA! Zagreb it is! The boat hums to life. 🚤" },
      { text: "Dubrovnik", correct: false, response: "That's King's Landing. Wait, wrong franchise." },
      { text: "Oslo", correct: false, response: "That's in NORWAY. You haven't arrived yet, Bianca!" }
    ],
    successMsg: "The yacht roars to life! Next stop: somewhere very, very far north. ⛵🌊"
  },

  // LEVEL 5: The European Detour (IKEA)
  {
    title: "The European Detour",
    emoji: "🇸🇪",
    story: `<span class="narrator">Chapter V.</span> Bianca sailed north through Europe. She was making great time until she accidentally docked in... Sweden.<br><br>More specifically, she somehow ended up inside an IKEA.<br><br>It had been 3 hours. She was on her 4th cinnamon roll. She could not find the exit. The arrows on the floor kept leading her back to the KALLAX shelves.<br><br><span class="ouf">OUF!</span><br><br>She needed to figure out the exit pattern.`,
    puzzle: "sequence",
    instruction: "The IKEA exit code! What comes next in this pattern?<br><br>BILLY → KALLAX → MALM → ???<br><br><em>(Hint: These are IKEA furniture names in alphabetical order... what common IKEA product starts with the next letter?)</em>",
    answer: "POÄNG",
    accept: ["POANG", "POÄNG", "PAX"],
    hint: "Famous IKEA chair... starts with P 🪑",
    successMsg: "SHE'S FREE! Bianca bursts out of IKEA, traumatized but carrying 3 scented candles she didn't need. 🕯️"
  },

  // LEVEL 6: The Viking Greeting
  {
    title: "The Viking Greeting",
    emoji: "🇳🇴",
    story: `<span class="narrator">Chapter VI.</span> Finally! NORWAY! The land of fjords, brown cheese, and people who stand 3 meters apart at bus stops!<br><br>Princess Bianca stepped off the boat and did what she does best — she walked up to a group of Norwegians with open arms, a huge smile, and said "HIII!!" at maximum volume.<br><br>They all took one step backward. Simultaneously. Like a choreographed dance of social discomfort.<br><br><span class="ouf">OUF!</span><br><br>She needed to learn the local customs... fast.`,
    puzzle: "matching",
    instruction: "Match the Norwegian custom to what it ACTUALLY means:",
    pairs: [
      { left: "Standing far apart at bus stops", right: "This is friendship" },
      { left: "A slight nod from a stranger", right: "Basically a marriage proposal" },
      { left: "Being invited to someone's cabin", right: "You are now family" },
      { left: "Saying 'we should get coffee'", right: "You will never hear from them again" }
    ],
    successMsg: "Bianca now understands: in Norway, silence IS the party. She respectfully disagrees. 🎉"
  },

  // LEVEL 7: The Darkness
  {
    title: "The Great Darkness",
    emoji: "🌑",
    story: `<span class="narrator">Chapter VII.</span> Winter arrived. And with it... THE DARKNESS.<br><br>The sun simply... left. Like a guest at a Norwegian party — quietly, without saying goodbye, at 2:30 PM.<br><br>Bianca, a woman built for Mediterranean sunshine, cigarettes on terraces, and espresso in the warm glow of the Adriatic, was now living in what felt like the inside of a pocket.<br><br><span class="ouf">OUF! OUF! OUF!</span><br><br>She hadn't seen the sun in 47 days.`,
    puzzle: "riddle",
    instruction: "Solve the riddle to find light in the darkness:",
    riddle: "I disappear in winter and return in spring.<br>Norwegians celebrate me like I'm a king.<br>When I finally show my face, people literally applaud.<br>What am I?",
    answer: "SUN",
    accept: ["SUN", "THE SUN", "SOLEN", "SOL"],
    hint: "Norwegians literally throw parties when this comes back... ☀️",
    successMsg: "But the sun won't return for months yet. Bianca must find ANOTHER kind of light... 🕯️✨"
  },

  // LEVEL 8: The Party Revival
  {
    title: "The Party Revival",
    emoji: "🎭",
    story: `<span class="narrator">Chapter VIII.</span> Bianca decided that if Norway wouldn't give her sunshine, she would CREATE her own warmth. How? The only way she knew how.<br><br>A PARTY. Not just any party. A full murder mystery experience — costumes, characters, plot twists, dramatic accusations, the works.<br><br>She invited every Norwegian she'd met. They all showed up 15 minutes early (because Norwegians are ALWAYS on time) and stood in the corner holding their drink with both hands.<br><br>By the end of the night? They were ALL screaming accusations at each other. Bianca had done the impossible: she made Norwegians LOUD.`,
    puzzle: "murder",
    instruction: "Solve Bianca's murder mystery! Who killed Baron Brunost?<br><br>🔍 <b>Clues:</b><br>• The killer hates brown cheese<br>• The killer was seen near the fjord at midnight<br>• Viking Vegard loves brown cheese — he would NEVER destroy it<br>• Fjord Frida was home knitting<br>• Troll Trond was spotted at the fjord, complaining about cheese",
    options: [
      { text: "🗡️ Viking Vegard", correct: false, response: "Vegard LOVES brown cheese! He would never harm Baron Brunost!" },
      { text: "🧶 Fjord Frida", correct: false, response: "Frida has an alibi — she was home knitting a sweater. A very Norwegian alibi." },
      { text: "🧌 Troll Trond", correct: true, response: "CORRECT! Trond was at the fjord AND hates cheese! Case closed!" },
      { text: "👸 Princess Bianca", correct: false, response: "The HOST never commits the murder! That's Murder Mystery 101!" }
    ],
    successMsg: "Bianca's party was a LEGENDARY success. She's basically a Norwegian national hero now. 🎉👑"
  },

  // LEVEL 9: The Friends She Made
  {

  {

    emoji: "🌅",
    story: `<span class="narrator">The Final Chapter.</span> Spring arrived. The sun returned to Norway — slowly at first, then all at once, painting the fjords in gold and the sky in colors that made even Bianca speechless.<br><br>And she realized something: she had been looking for light this whole time — in espresso, in parties, in sunshine...<br><br>But the light was already there. It was in every friend who laughed at her jokes. Every room she made louder. Every heart she warmed just by being, unapologetically, <em>completely</em> herself.<br><br>The light wasn't in Norway or Croatia.<br><br>The light was Bianca.`,
    puzzle: "final",
    instruction: "One last thing, princess. What is today?",
    answer: "BIRTHDAY",
    accept: ["BIRTHDAY", "MY BIRTHDAY", "BIANCAS BIRTHDAY", "BIANCA'S BIRTHDAY", "BURSDAG", "ROĐENDAN"],
    hint: "🎂 Check the calendar... it's a special day for a certain princess...",
    successMsg: null // handled specially
  }
];

// ===== RENDER FUNCTIONS =====

function createStars() {
  const container = document.getElementById('stars');
  for (let i = 0; i < 80; i++) {
    const star = document.createElement('div');
    star.className = 'star';
    const size = Math.random() * 3 + 1;
    star.style.cssText = `
      width: ${size}px; height: ${size}px;
      left: ${Math.random() * 100}%; top: ${Math.random() * 100}%;
      --dur: ${Math.random() * 3 + 2}s;
      animation-delay: ${Math.random() * 3}s;
    `;
    container.appendChild(star);
  }
}

function updateProgress() {
  const pct = (state.level / 10) * 100;
  document.getElementById('progressBar').style.width = pct + '%';
}

function runPrincess() {
  const p = document.createElement('div');
  p.className = 'princess-run';
  p.textContent = '👸💨';
  document.body.appendChild(p);
  setTimeout(() => p.remove(), 4500);
}

function launchConfetti() {
  const colors = ['#d4a843', '#ff6b6b', '#6bff8a', '#6bb5ff', '#ff6bff', '#ffaa6b'];
  for (let i = 0; i < 60; i++) {
    const piece = document.createElement('div');
    piece.className = 'confetti-piece';
    piece.style.cssText = `
      left: ${Math.random() * 100}vw;
      background: ${colors[Math.floor(Math.random() * colors.length)]};
      --fall-dur: ${Math.random() * 2 + 2}s;
      animation-delay: ${Math.random() * 1}s;
      border-radius: ${Math.random() > 0.5 ? '50%' : '2px'};
      width: ${Math.random() * 8 + 6}px;
      height: ${Math.random() * 8 + 6}px;
    `;
    document.body.appendChild(piece);
    setTimeout(() => piece.remove(), 5000);
  }
}

function renderTitle() {
  const app = document.getElementById('app');
  app.innerHTML = `
    <div class="title-screen">
      <span class="crown">👑</span>
      <h1>The Story of Bianca</h1>
      <p class="subtitle">An Absolutely True* Tale of a Croatian Princess</p>
      <p class="tagline">
        *approximately 2% true, 98% ridiculous<br><br>
        A tale of espresso, escape, darkness, and discovering<br>
        that the loudest person in the room might also be the brightest light in it.
      </p>
      <button class="btn" onclick="startGame()">Begin the Adventure</button>
    </div>
  `;
}

function renderLevel(num) {
  const lvl = levels[num];
  const app = document.getElementById('app');

  let puzzleHTML = '';

  if (lvl.puzzle === 'unscramble') {
    puzzleHTML = renderUnscramble(lvl);
  } else if (lvl.puzzle === 'choice' || lvl.puzzle === 'murder') {
    puzzleHTML = renderChoice(lvl);
  } else if (lvl.puzzle === 'sequence') {
    puzzleHTML = renderTextInput(lvl);
  } else if (lvl.puzzle === 'riddle') {
    puzzleHTML = renderRiddle(lvl);
  } else if (lvl.puzzle === 'matching') {
    puzzleHTML = renderMatching(lvl);
  } else if (lvl.puzzle === 'final') {
    puzzleHTML = renderTextInput(lvl);
  }

  app.innerHTML = `
    <div class="level-screen">
      <div class="level-header">Chapter ${num} of 10</div>
      <span class="level-emoji">${lvl.emoji}</span>
      <h2 class="level-title">${lvl.title}</h2>
      <div class="story-text">${lvl.story}</div>
      <div class="puzzle-area">
        <p class="puzzle-instruction">${lvl.instruction}</p>
        ${puzzleHTML}
        <div id="feedback"></div>
      </div>
      <button class="btn" id="nextBtn" style="display:none;" onclick="nextLevel()">Continue the Journey →</button>
    </div>
  `;

  if (lvl.puzzle === 'matching') initMatching(lvl);
}

function renderUnscramble(lvl) {
  const letters = lvl.scrambled.split('');
  return `
    <div class="answer-display" id="answerDisplay"></div>
    <div class="sequence-area" id="letterArea">
      ${letters.map((l, i) => `<div class="seq-letter" onclick="pickLetter(this, ${i})">${l}</div>`).join('')}
    </div>
    <button class="btn clear-btn" onclick="clearUnscramble()">Clear</button>
  `;
}

function renderChoice(lvl) {
  return `
    <div class="options-grid" id="optionsGrid">
      ${lvl.options.map((opt, i) => `
        <div class="option-btn" onclick="pickOption(${i})">${opt.text}</div>
      `).join('')}
    </div>
  `;
}

function renderTextInput(lvl) {
  return `
    ${lvl.riddle ? `<p style="font-size:1.1rem; color: var(--cream); line-height: 1.8; margin: 15px 0;">${lvl.riddle}</p>` : ''}
    <input class="answer-input" id="textAnswer" placeholder="Type your answer..."
      onkeydown="if(event.key==='Enter')checkTextAnswer()">
    <br>
    <button class="btn btn-small" onclick="checkTextAnswer()" style="margin-top:10px;">Submit</button>
  `;
}

function renderRiddle(lvl) {
  return renderTextInput(lvl);
}

function renderMatching(lvl) {
  return `
    <div class="match-container">
      <div class="match-left" id="matchLeft">
        ${lvl.pairs.map((p, i) => `<div class="match-item" data-idx="${i}" data-side="left" onclick="pickMatch(this)">${p.left}</div>`).join('')}
      </div>
      <div class="match-divider">→</div>
      <div class="match-right" id="matchRight">
        ${shuffleArray(lvl.pairs.map((p, i) => ({text: p.right, idx: i}))).map(p => `<div class="match-item" data-idx="${p.idx}" data-side="right" onclick="pickMatch(this)">${p.text}</div>`).join('')}
      </div>
    </div>
    <div id="matchCount" style="color: var(--gold); margin-top: 10px; font-family: Inter, sans-serif; font-size: 0.85rem;">Matched: 0 / ${lvl.pairs.length}</div>
  `;
}

// ===== PUZZLE LOGIC =====

// Unscramble
let currentWord = '';
window.pickLetter = function(el, idx) {
  if (el.classList.contains('used')) return;
  el.classList.add('used');
  currentWord += el.textContent;
  document.getElementById('answerDisplay').textContent = currentWord;

  const lvl = levels[state.level];
  if (currentWord.length === lvl.answer.length) {
    if (currentWord === lvl.answer) {
      showCorrect(lvl.successMsg);
    } else {
      showWrong("Hmm, that's not quite right. Try again!");
      setTimeout(clearUnscramble, 1000);
    }
  }
};

window.clearUnscramble = function() {
  currentWord = '';
  document.getElementById('answerDisplay').textContent = '';
  document.querySelectorAll('.seq-letter').forEach(el => el.classList.remove('used'));
};

// Choice
window.pickOption = function(idx) {
  const lvl = levels[state.level];
  const opt = lvl.options[idx];
  const btns = document.querySelectorAll('.option-btn');

  btns.forEach((btn, i) => {
    if (i === idx) {
      btn.classList.add(opt.correct ? 'correct' : 'wrong');
    }
  });

  if (opt.correct) {
    showFeedback(opt.response, 'correct');
    setTimeout(() => showCorrect(lvl.successMsg), 1500);
  } else {
    showFeedback(opt.response, 'wrong');
    setTimeout(() => {
      btns[idx].classList.remove('wrong');
      document.getElementById('feedback').innerHTML = '';
    }, 2000);
  }
};

// Text input
window.checkTextAnswer = function() {
  const lvl = levels[state.level];
  const input = document.getElementById('textAnswer');
  const val = input.value.trim().toUpperCase();

  const validAnswers = [lvl.answer, ...(lvl.accept || [])].map(a => a.toUpperCase());

  if (validAnswers.includes(val)) {
    if (state.level === 10) {
      showFinalScreen();
    } else {
      showCorrect(lvl.successMsg);
    }
  } else {
    showFeedback(lvl.hint || "Not quite! Try again.", 'hint');
    input.value = '';
    input.focus();
  }
};

// Matching
let matchState = { selected: null, matched: 0, total: 0 };

function initMatching(lvl) {
  matchState = { selected: null, matched: 0, total: lvl.pairs.length };
}

window.pickMatch = function(el) {
  if (el.classList.contains('matched')) return;

  if (!matchState.selected) {
    matchState.selected = el;
    el.classList.add('active');
  } else {
    const first = matchState.selected;
    const second = el;

    if (first.dataset.side === second.dataset.side) {
      first.classList.remove('active');
      matchState.selected = el;
      el.classList.add('active');
      return;
    }

    const leftEl = first.dataset.side === 'left' ? first : second;
    const rightEl = first.dataset.side === 'right' ? first : second;

    if (leftEl.dataset.idx === rightEl.dataset.idx) {
      leftEl.classList.remove('active');
      leftEl.classList.add('matched');
      rightEl.classList.add('matched');
      matchState.matched++;
      document.getElementById('matchCount').textContent = `Matched: ${matchState.matched} / ${matchState.total}`;

      if (matchState.matched === matchState.total) {
        const lvl = levels[state.level];
        setTimeout(() => showCorrect(lvl.successMsg), 500);
      }
    } else {
      first.classList.remove('active');
      second.classList.add('active');
      showFeedback("Not quite! Try a different match.", 'wrong');
      setTimeout(() => {
        second.classList.remove('active');
        document.getElementById('feedback').innerHTML = '';
      }, 1000);
    }
    matchState.selected = null;
  }
};

// ===== HELPERS =====

function showFeedback(msg, type) {
  document.getElementById('feedback').innerHTML = `<div class="feedback ${type}">${msg}</div>`;
}

function showWrong(msg) {
  showFeedback(msg, 'wrong');
}

function showCorrect(msg) {
  showFeedback(msg, 'correct');
  runPrincess();
  document.getElementById('nextBtn').style.display = 'inline-block';
}

function showFinalScreen() {
  launchConfetti();
  setTimeout(launchConfetti, 1500);
  setTimeout(launchConfetti, 3000);

  const app = document.getElementById('app');
  app.innerHTML = `
    <div class="final-screen">
      <div class="final-emoji">👑🎂✨</div>
      <h1>Happy Birthday, Bianca!</h1>
      <div class="birthday-text">
        You made it through all 10 chapters!<br><br>
        From the espresso crisis of Croatia<br>
        to the silent bus stops of Norway...<br><br>
        You crossed seas, escaped IKEA,<br>
        survived the darkness,<br>
        and made an entire country louder.<br><br>
        <span style="color: var(--gold); font-size: 1.5rem;">You ARE the light, Bianca.</span><br><br>
        <span class="ouf" style="font-size: 2rem;">OUF! 🎉</span><br><br>
        <em style="color: #aaa;">Happy birthday from your Norwegian friend who<br>
        definitely did NOT make an entire website just for you.<br>
        (Okay, they did. Because you're worth it.)</em><br><br>
        <span style="font-size: 2rem;">🇭🇷 ❤️ 🇳🇴</span>
      </div>
      <button class="btn" onclick="location.reload()">Play Again? 👸</button>
    </div>
  `;

  document.getElementById('progressBar').style.width = '100%';
}

function shuffleArray(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

// ===== NAVIGATION =====

window.startGame = function() {
  state.level = 1;
  updateProgress();
  renderLevel(1);
};

window.nextLevel = function() {
  state.level++;
  updateProgress();
  if (state.level > 10) {
    showFinalScreen();
  } else {
    currentWord = '';
    renderLevel(state.level);
  }
};

// ===== INIT =====
createStars();
renderTitle();
</script>
